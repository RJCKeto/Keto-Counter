<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keto Day Count</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keto">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --burgundy-top: #6E1A18;
    --burgundy-bottom: #4A0F0F;
    --green: #1F4A2C;
    --green-light: #2A5C38;
    --gold: #D8B65A;
    --gold-light: #E8CC7E;
    --gold-deep: #C29A3E;
    --maroon-text: #5C1414;
    --maroon-text-soft: #7A2E1E;
    --cream: #EFD89A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  html {
    background: var(--burgundy-bottom);
  }

  body {
    background: linear-gradient(180deg, var(--burgundy-top) 0%, var(--burgundy-bottom) 600px, var(--burgundy-bottom) 100%);
    font-family: 'Fraunces', serif;
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 20px 40px;
  }

  .page {
    width: 100%;
    max-width: 460px;
  }

  /* name badge */
  .badge-row {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }

  .badge {
    background: var(--gold);
    color: var(--maroon-text);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 12px 26px;
    border-radius: 999px;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .subtitle {
    text-align: center;
    font-size: 19px;
    font-style: italic;
    font-weight: 500;
    color: var(--gold-light);
    margin-bottom: 22px;
  }

  /* medal */
  .medal-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(12px, 3vh, 28px);
  }

  .medal {
    width: clamp(160px, 34vmin, 280px);
    height: clamp(160px, 34vmin, 280px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--green-light), var(--green) 70%);
    border: 7px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15), 0 12px 32px rgba(0,0,0,0.35), inset 0 2px 12px rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .medal-count {
    font-size: clamp(48px, 11vmin, 90px);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .medal-label {
    font-size: clamp(16px, 3.6vmin, 26px);
    font-style: italic;
    font-weight: 500;
    color: var(--gold);
    margin-top: 4px;
  }

  /* gold cards */
  .card {
    background: var(--gold);
    border-radius: 18px;
    padding: 18px 24px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }

  .stats-card {
    display: flex;
    align-items: stretch;
    justify-content: center;
    text-align: center;
  }

  .stat {
    flex: 1;
    padding: 0 18px;
  }

  .stat-num {
    font-size: 40px;
    font-weight: 700;
    color: var(--maroon-text);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--maroon-text-soft);
    text-transform: uppercase;
    margin-top: 10px;
  }

  .stat-divider {
    width: 1px;
    background: rgba(92,20,20,0.25);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--maroon-text);
    font-weight: 500;
  }

  .update-btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--maroon-text);
    background: rgba(92,20,20,0.12);
    border: none;
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s ease;
  }

  .update-btn:hover { background: rgba(92,20,20,0.2); }
  .update-btn:focus-visible { outline: 2px solid var(--maroon-text); outline-offset: 2px; }

  .weight-row {
    display: flex;
    justify-content: space-between;
    text-align: center;
  }

  .weight-item { flex: 1; }

  .weight-num {
    font-size: 30px;
    font-weight: 700;
    color: var(--maroon-text);
  }

  .weight-num small {
    font-size: 17px;
    font-weight: 600;
  }

  .weight-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--maroon-text-soft);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .weight-divider {
    width: 1px;
    background: rgba(92,20,20,0.2);
    margin: 4px 6px;
  }

  .milestone-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .milestone-target {
    font-size: 30px;
    font-weight: 700;
    color: var(--maroon-text);
  }

  .milestone-right {
    text-align: right;
  }

  .milestone-num {
    font-size: 30px;
    font-weight: 700;
    color: var(--maroon-text);
    line-height: 1;
  }

  .milestone-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--maroon-text-soft);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* edit forms */
  .edit-form {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .edit-form.show { display: flex; }
  .card-body.hide { display: none; }

  .field-row {
    display: flex;
    gap: 10px;
  }

  .field-row label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--maroon-text-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  input[type="number"], input[type="text"] {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid rgba(92,20,20,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: var(--maroon-text);
    outline: none;
    width: 100%;
  }

  input[type="number"]:focus-visible, input[type="text"]:focus-visible {
    border-color: var(--maroon-text);
    box-shadow: 0 0 0 2px rgba(92,20,20,0.2);
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-save, .btn-cancel {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
  }

  .btn-save {
    background: var(--maroon-text);
    color: var(--gold-light);
    flex: 1;
  }

  .btn-cancel {
    background: transparent;
    color: var(--maroon-text-soft);
    text-decoration: underline;
  }

  @media (max-width: 380px) {
    .stat-num { font-size: 32px; }
  }
  @media (max-height: 700px) {
    body { padding-top: 16px; padding-bottom: 24px; }
    .badge-row { margin-bottom: 10px; }
    .subtitle { margin-bottom: 14px; font-size: 16px; }
    .card { padding: 14px 22px; margin-bottom: 10px; }
    .card-header { margin-bottom: 10px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="badge-row"><div class="badge" id="nameBadge">Rob's Keto</div></div>
  <div class="subtitle" id="subtitleText">Started on March 24th, 2026</div>

  <div class="medal-wrap">
    <div class="medal">
      <div class="medal-count" id="medalCount">0</div>
      <div class="medal-label">Days</div>
    </div>
  </div>

  <div class="card stats-card">
    <div class="stat">
      <div class="stat-num" id="weeksNum">0</div>
      <div class="stat-label">Weeks</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="remDaysNum">0</div>
      <div class="stat-label">Days</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Current Weight</div>
      <button class="update-btn" id="weightEditBtn" type="button">✎ Update</button>
    </div>

    <div class="card-body" id="weightDisplay">
      <div class="weight-row">
        <div class="weight-item">
          <div class="weight-num" id="weightStones">15<small>st</small> 0<small>lb</small></div>
          <div class="weight-label">Stones</div>
        </div>
        <div class="weight-divider"></div>
        <div class="weight-item">
          <div class="weight-num" id="weightLb">210<small>lb</small></div>
          <div class="weight-label">Pounds</div>
        </div>
        <div class="weight-divider"></div>
        <div class="weight-item">
          <div class="weight-num" id="weightKg">95.3<small>kg</small></div>
          <div class="weight-label">Kilograms</div>
        </div>
      </div>
    </div>

    <form class="edit-form" id="weightForm">
      <div class="field-row">
        <label>Weight in pounds
          <input type="number" id="weightInputLb" step="0.1" min="0" inputmode="decimal">
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save">Save</button>
        <button type="button" class="btn-cancel" id="weightCancelBtn">Cancel</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Next Milestone</div>
      <button class="update-btn" id="milestoneEditBtn" type="button">✎ Update</button>
    </div>

    <div class="card-body" id="milestoneDisplay">
      <div class="milestone-row">
        <div class="milestone-target" id="milestoneTargetText">100 Days</div>
        <div class="milestone-right">
          <div class="milestone-num" id="milestoneDaysLeft">13</div>
          <div class="milestone-sub" id="milestoneSubText">days to go</div>
        </div>
      </div>
    </div>

    <form class="edit-form" id="milestoneForm">
      <div class="field-row">
        <label>Target day count
          <input type="number" id="milestoneInput" step="1" min="1" inputmode="numeric">
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save">Save</button>
        <button type="button" class="btn-cancel" id="milestoneCancelBtn">Cancel</button>
      </div>
    </form>
  </div>

</div>

<script>
  const START_DATE = '2026-03-24';
  const LS_WEIGHT = 'keto_weight_lb';
  const LS_MILESTONE = 'keto_milestone';

  function daysSince(dateStr) {
    const start = new Date(dateStr + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    return Math.floor((today - start) / 86400000) + 1;
  }

  function ordinal(n) {
    const s = ['th','st','nd','rd'];
    const v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  const days = Math.max(daysSince(START_DATE), 0);
  const weeks = Math.floor(days / 7);
  const remDays = days % 7;

  document.getElementById('medalCount').textContent = days;
  document.getElementById('weeksNum').textContent = weeks;
  document.getElementById('remDaysNum').textContent = remDays;

  const startDateObj = new Date(START_DATE + 'T00:00:00');
  const monthName = startDateObj.toLocaleString('en-US', { month: 'long' });
  document.getElementById('subtitleText').textContent =
    `Started on ${monthName} ${ordinal(startDateObj.getDate())}, ${startDateObj.getFullYear()}`;

  // ---------- WEIGHT ----------
  const weightDisplay = document.getElementById('weightDisplay');
  const weightForm = document.getElementById('weightForm');
  const weightEditBtn = document.getElementById('weightEditBtn');
  const weightCancelBtn = document.getElementById('weightCancelBtn');
  const weightInputLb = document.getElementById('weightInputLb');

  function renderWeight(lb) {
    if (lb == null || isNaN(lb)) return;
    const totalStones = lb / 14;
    const stones = Math.floor(totalStones);
    const remLb = Math.round(lb - stones * 14);
    const kg = lb * 0.453592;

    document.getElementById('weightStones').innerHTML = `${stones}<small>st</small> ${remLb}<small>lb</small>`;
    document.getElementById('weightLb').innerHTML = `${lb % 1 === 0 ? lb : lb.toFixed(1)}<small>lb</small>`;
    document.getElementById('weightKg').innerHTML = `${kg.toFixed(1)}<small>kg</small>`;
  }

  function loadWeight() {
    try {
      const stored = localStorage.getItem(LS_WEIGHT);
      return stored ? parseFloat(stored) : 210;
    } catch (e) { return 210; }
  }

  let currentWeight = loadWeight();
  renderWeight(currentWeight);

  weightEditBtn.addEventListener('click', () => {
    weightInputLb.value = currentWeight;
    weightDisplay.classList.add('hide');
    weightForm.classList.add('show');
    weightInputLb.focus();
  });

  weightCancelBtn.addEventListener('click', () => {
    weightForm.classList.remove('show');
    weightDisplay.classList.remove('hide');
  });

  weightForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = parseFloat(weightInputLb.value);
    if (!isNaN(val) && val > 0) {
      currentWeight = val;
      try { localStorage.setItem(LS_WEIGHT, String(val)); } catch (e) {}
      renderWeight(val);
    }
    weightForm.classList.remove('show');
    weightDisplay.classList.remove('hide');
  });

  // ---------- MILESTONE ----------
  const milestoneDisplay = document.getElementById('milestoneDisplay');
  const milestoneForm = document.getElementById('milestoneForm');
  const milestoneEditBtn = document.getElementById('milestoneEditBtn');
  const milestoneCancelBtn = document.getElementById('milestoneCancelBtn');
  const milestoneInput = document.getElementById('milestoneInput');

  function renderMilestone(target) {
    document.getElementById('milestoneTargetText').textContent = `${target} Days`;
    const diff = target - days;
    if (diff > 0) {
      document.getElementById('milestoneDaysLeft').textContent = diff;
      document.getElementById('milestoneSubText').textContent = 'days to go';
    } else if (diff === 0) {
      document.getElementById('milestoneDaysLeft').textContent = '🎉';
      document.getElementById('milestoneSubText').textContent = 'today!';
    } else {
      document.getElementById('milestoneDaysLeft').textContent = Math.abs(diff);
      document.getElementById('milestoneSubText').textContent = 'days past';
    }
  }

  function loadMilestone() {
    try {
      const stored = localStorage.getItem(LS_MILESTONE);
      return stored ? parseInt(stored, 10) : 100;
    } catch (e) { return 100; }
  }

  let currentMilestone = loadMilestone();
  renderMilestone(currentMilestone);

  milestoneEditBtn.addEventListener('click', () => {
    milestoneInput.value = currentMilestone;
    milestoneDisplay.classList.add('hide');
    milestoneForm.classList.add('show');
    milestoneInput.focus();
  });

  milestoneCancelBtn.addEventListener('click', () => {
    milestoneForm.classList.remove('show');
    milestoneDisplay.classList.remove('hide');
  });

  milestoneForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = parseInt(milestoneInput.value, 10);
    if (!isNaN(val) && val > 0) {
      currentMilestone = val;
      try { localStorage.setItem(LS_MILESTONE, String(val)); } catch (e) {}
      renderMilestone(val);
    }
    milestoneForm.classList.remove('show');
    milestoneDisplay.classList.remove('hide');
  });

  // ---------- FAVICON ----------
  function setFavicons(dayCount) {
    const text = String(dayCount);

    const size = 64;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const radius = 14;
    ctx.fillStyle = '#1F4A2C';
    ctx.beginPath();
    ctx.moveTo(radius, 0);
    ctx.arcTo(size, 0, size, size, radius);
    ctx.arcTo(size, size, 0, size, radius);
    ctx.arcTo(0, size, 0, 0, radius);
    ctx.arcTo(0, 0, size, 0, radius);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#D8B65A';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#D8B65A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let fontSize = text.length <= 2 ? 36 : text.length === 3 ? 28 : 22;
    ctx.font = `700 ${fontSize}px Georgia, serif`;
    ctx.fillText(text, size / 2, size / 2 + 2);

    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.type = 'image/png';
    link.href = canvas.toDataURL('image/png');

    const touchSize = 180;
    const tCanvas = document.createElement('canvas');
    tCanvas.width = touchSize; tCanvas.height = touchSize;
    const tctx = tCanvas.getContext('2d');
    tctx.fillStyle = '#1F4A2C';
    tctx.fillRect(0, 0, touchSize, touchSize);
    tctx.strokeStyle = '#D8B65A';
    tctx.lineWidth = 6;
    tctx.strokeRect(3, 3, touchSize - 6, touchSize - 6);
    tctx.fillStyle = '#D8B65A';
    tctx.textAlign = 'center';
    tctx.textBaseline = 'middle';
    let touchFont = text.length <= 2 ? 100 : text.length === 3 ? 78 : 62;
    tctx.font = `700 ${touchFont}px Georgia, serif`;
    tctx.fillText(text, touchSize / 2, touchSize / 2 + 6);

    let touchLink = document.querySelector("link[rel='apple-touch-icon']");
    if (!touchLink) { touchLink = document.createElement('link'); touchLink.rel = 'apple-touch-icon'; document.head.appendChild(touchLink); }
    touchLink.href = tCanvas.toDataURL('image/png');
  }

  setFavicons(days);
</script>

</body>
</html>
